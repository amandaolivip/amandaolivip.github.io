<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>

        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="contato" class="container">
      <div class="item">
      <h2>✧ Contato ✧</h2>
      <img src="https://media1.tenor.com/m/EC6mBMhIRugAAAAd/frieren-beyond-journey%27s-end-sousou-no-frieren.gif" alt="Frieren" class="frieren-gifs">
      <p>Oi! Deseja falar comigo? Envie-me uma mensagem através do formulário abaixo:</p>
      <form id="form-contato">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <label for="mensagem">Mensagem:</label>
      <textarea
      id="mensagem"
      name="mensagem"
      rows="4"
      cols="50"
      required>
      </textarea>
      <br>
      <button type="submit" id="btn-enviar">
      <span id="btn-text">Enviar</span>
      <span id="btn-loading" style="display:none;">Enviando...</span>
    </button>
      </form>
      </div>
    </section>
  </main>

<script src="script.js"></script>
</body>
